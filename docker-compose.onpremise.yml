# On-Premise extras — Working Local
#
# Deploy samen met de individuele service repos via Coolify.
# Dit bestand voegt toe:
#   - Cloudflared: tunnel naar Cloudflare (vervangt vaste DNS + open poorten)
#   - Urbackup: backup server (ontvangt backups van andere toestellen)
#
# Gebruik:
#   docker compose -f docker-compose.onpremise.yml up -d
#
# Vereisten:
#   - .env bestand aangemaakt op basis van .env.onpremise.template
#   - Cloudflare tunnel token aangemaakt (zie docs/onpremise.md)

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - coolify

  urbackup:
    image: urbackup/server:latest
    restart: unless-stopped
    volumes:
      - urbackup_data:/var/urbackup
      - urbackup_backups:/backups
    ports:
      - "55413:55413"   # urbackup client protocol
      - "55414:55414"   # urbackup client protocol
      - "55415:55415"   # urbackup internet protocol
    expose:
      - "55414"         # web UI via Traefik
    networks:
      - coolify

volumes:
  urbackup_data:
  urbackup_backups:

networks:
  coolify:
    external: true
    name: coolify
